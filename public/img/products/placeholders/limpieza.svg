<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.25" flood-color="#000000"/>
    </filter>
  </defs>
  <!-- Card Background -->
  <rect width="400" height="400" rx="28" fill="url(#grad)" />
  <!-- Glassmorphism Interior Ring -->
  <rect x="14" y="14" width="372" height="372" rx="20" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.09" stroke-width="1.5" />
  
  <!-- Centered Drawing (with shadow drop filter) -->
  <g filter="url(#shadow)">
    <path d="M200,90 C200,90 260,160 260,205 C260,243.7 228.7,275 200,275 C161.3,275 130,243.7 130,205 C130,160 200,90 200,90 Z" fill="white" opacity="0.95" />
           <circle cx="180" cy="180" r="10" fill="#0EA5E9" />
           <circle cx="215" cy="210" r="15" fill="#0EA5E9" />
           <circle cx="170" cy="220" r="8" fill="#0EA5E9" />
  </g>
  
  <!-- Typography Branding -->
  <text x="200" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="white" fill-opacity="0.92" letter-spacing="2.5" text-anchor="middle" style="text-transform: uppercase;">
    ARTÍCULOS LIMPIEZA
  </text>
  <text x="200" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="white" fill-opacity="0.45" letter-spacing="1.5" text-anchor="middle" style="text-transform: uppercase;">
    OFFICE CITY CATALOG
  </text>
</svg>